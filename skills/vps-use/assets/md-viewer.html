<!doctype html><meta charset="utf-8"><style class="fallback">body{visibility:hidden;}</style>
<!--
  Markdown viewer — same structure as a Markdeep .md.html file.
  Caddy rewrites *.md (Accept: text/html) here; CLI fetch gets raw file_server.
-->
<style>
  body { padding-top: 3em !important; }
  .md-chrome {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    display: flex; align-items: center; justify-content: space-between;
    padding: .5em 1em; gap: 1em; pointer-events: none;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif; font-size: .9em;
  }
  .md-chrome > * { pointer-events: auto; }
  .crumbs {
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    background: rgba(255,255,255,.92); backdrop-filter: blur(6px);
    border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,.18); padding: .35em .75em;
  }
  .crumbs a { color: #0969da; text-decoration: none; }
  .crumbs a:hover { text-decoration: underline; }
  .crumbs .sep { color: #6e7781; margin: 0 .2em; }
  .crumbs .cur { color: #24292f; font-weight: 500; }
  .dl-btn {
    color: #fff; background: #0969da; border-radius: 6px;
    padding: .35em .75em; text-decoration: none; white-space: nowrap;
    box-shadow: 0 2px 6px rgba(0,0,0,.18);
  }
  .dl-btn:hover { background: #0550ae; }
</style>
<script>
(function () {
  var src = location.pathname;
  var name = decodeURIComponent(src.split('/').pop());
  document.title = name;

  // base: relative images/links in the md resolve to the file's directory
  var base = document.createElement('base');
  base.href = location.origin + src.substring(0, src.lastIndexOf('/') + 1);
  document.head.appendChild(base);

  window.markdeepOptions = { tocStyle: 'auto', detectMath: true };

  function buildChrome() {
    if (document.querySelector('.md-chrome')) return;

    var crumbs = document.createElement('nav');
    crumbs.className = 'crumbs';
    var parts = src.split('/').filter(Boolean);
    var acc = '';
    parts.forEach(function (p, i) {
      acc += '/' + p;
      if (i > 0) {
        var sep = document.createElement('span');
        sep.className = 'sep'; sep.textContent = '/';
        crumbs.appendChild(sep);
      }
      if (i === parts.length - 1) {
        var cur = document.createElement('span');
        cur.className = 'cur'; cur.textContent = decodeURIComponent(p);
        crumbs.appendChild(cur);
      } else {
        var a = document.createElement('a');
        a.href = acc + '/';
        a.textContent = i === 0 ? '📂' : decodeURIComponent(p);
        crumbs.appendChild(a);
      }
    });

    var dl = document.createElement('a');
    dl.className = 'dl-btn';
    dl.href = src;
    dl.setAttribute('download', name);
    dl.textContent = '⇩ 下载原文';

    var chrome = document.createElement('div');
    chrome.className = 'md-chrome';
    chrome.appendChild(crumbs);
    chrome.appendChild(dl);
    document.body.insertBefore(chrome, document.body.firstChild);
  }

  // <base> makes #anchor resolve to base-origin/#anchor instead of current page.
  // Intercept and do a local hash change instead.
  document.addEventListener('click', function (e) {
    var a = e.target && e.target.closest && e.target.closest('a');
    if (!a) return;
    var raw = a.getAttribute('href');
    if (raw && raw.charAt(0) === '#') {
      e.preventDefault();
      var h = raw.slice(1);
      if (location.hash === '#' + h) location.hash = '';
      location.hash = h;
    }
  }, true);

  fetch(src, { headers: { Accept: 'text/plain' }, cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function (md) {
      // Put raw markdown into body — Markdeep reads body.innerText and replaces body.innerHTML.
      document.body.textContent = md;

      // Load Markdeep dynamically. readyState is already 'complete', so it processes immediately.
      var s = document.createElement('script');
      s.src = 'https://casual-effects.com/markdeep/latest/markdeep.min.js?';
      s.charset = 'utf-8';
      s.onload = function () {
        buildChrome();
        setTimeout(buildChrome, 100); // safety net if Markdeep has async post-processing
      };
      document.head.appendChild(s);
    })
    .catch(function (e) {
      document.body.style.visibility = 'visible';
      document.body.textContent = 'Error loading ' + name + ': ' + e.message;
    });
}());
</script>
